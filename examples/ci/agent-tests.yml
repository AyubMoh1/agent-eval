name: Agent Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Run agent evaluations
        run: npx agent-eval run tests/ --reporter github-actions
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Save results
        if: always()
        run: npx agent-eval run tests/ --reporter json > results.json

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-results
          path: results.json
